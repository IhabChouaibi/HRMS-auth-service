name: Test and Build Docker Image

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master
permissions:
  contents: read
  packages: write

jobs:
  test-and-build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Check Java version
        run: |
          java -version
          javac -version

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Test code
        run: ./mvnw test -Dspring.profiles.active=test -Dtest='!*AuthServiceApplicationTests'

      - name: Build JAR
        run: ./mvnw clean package


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ihabchouaibi/hrms-auth-service:${{ github.sha }}